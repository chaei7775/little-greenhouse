<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>작은 온실</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
    #popup-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    #popup-overlay.show { display: flex; }
    #popup-box {
      background: #fdf6e3;
      border: 3px solid #d4a373;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      font-family: Georgia, serif;
    }
    #popup-box h2 { color: #5c3d1e; font-size: 20px; margin-bottom: 15px; }
    #popup-box p { color: #7a5c3a; font-size: 14px; margin-bottom: 20px; }
    #popup-box input {
      width: 100%; padding: 10px;
      border: 2px solid #d4a373; border-radius: 10px;
      font-size: 16px; text-align: center;
      box-sizing: border-box; margin-bottom: 15px;
      font-family: Georgia, serif; color: #5c3d1e;
    }
    #popup-box button {
      background: #d4a373; color: white;
      border: none; border-radius: 10px;
      padding: 10px 30px; font-size: 16px;
      cursor: pointer; font-family: Georgia, serif;
    }
    #popup-box button:hover { background: #b8834f; }
    .popup-emoji { font-size: 40px; margin-bottom: 10px; }

    #inventory-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
#inventory-overlay.show { display: flex; }
#inventory-box {
  background: #1a1a2e;
  border-radius: 20px;
  padding: 20px;
  max-width: 360px;
  width: 90%;
  max-height: 70vh;
  overflow-y: auto;
  position: relative;
}
#inventory-box h2 {
  color: #ffffff;
  font-size: 18px;
  font-family: Arial;
  text-align: center;
  margin-bottom: 10px;
}
#inventory-money {
  color: #ffd700;
  font-size: 14px;
  font-family: Arial;
  text-align: center;
  margin-bottom: 15px;
}
#inventory-close {
  position: absolute;
  top: 15px; right: 15px;
  color: #ffffff;
  font-size: 20px;
  cursor: pointer;
  font-family: Arial;
}
#inventory-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.inv-item {
  text-align: center;
  background: #2d5a27;
  border-radius: 10px;
  padding: 8px;
}
.inv-item img {
  width: 50px;
  height: 50px;
  object-fit: contain;
}
.inv-item .inv-name {
  color: #ffffff;
  font-size: 9px;
  font-family: Arial;
  margin-top: 3px;
}
.inv-item .inv-count {
  color: #ffd700;
  font-size: 10px;
  font-family: Arial;
}
  </style>
</head>
<body>
  <div id="popup-overlay">
    <div id="popup-box">
      <div class="popup-emoji">🌿</div>
      <img id="popup-img" src="" style="display:none; width:100%; border-radius:10px; margin-bottom:10px;">
      <h2 id="popup-title">작은 온실에 오신걸 환영해요!</h2>
      <p id="popup-desc">닉네임을 입력해주세요</p>
      <input type="text" id="popup-input" placeholder="닉네임 입력" maxlength="10">
      <br>
      <button id="popup-btn">확인</button>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="FlowerData.js"></script>
  <script src="SaveSystem.js"></script>
  <script src="UIScene.js"></script>
  <script src="ShopScene.js"></script>
  <script src="FlowerShopScene.js"></script>
  <script src="FieldScene.js"></script>
  <script src="game.js"></script>

  <div id="inventory-overlay">
  <div id="inventory-box">
    <span id="inventory-close">✕</span>
    <h2>🎒 인벤토리</h2>
    <div id="inventory-money"></div>
    <div id="inventory-grid"></div>
  </div>
</div>
</body>
</html>
